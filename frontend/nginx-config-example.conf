# ============================================
# 邮件批量发送系统 - Nginx 配置示例
# ============================================
# 将此文件保存到：/etc/nginx/sites-available/mail-batch-system
# 然后执行：
#   sudo ln -s /etc/nginx/sites-available/mail-batch-system /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
# ============================================

server {
    listen 80;
    server_name your-domain.com;  # 修改为你的域名或 IP
    
    # 前端静态文件目录（与 deploy.sh 中的 DEPLOY_DIR 一致）
    root /var/www/mail-batch-system;
    index index.html;
    
    # 日志
    access_log /var/log/nginx/mail-batch-access.log;
    error_log /var/log/nginx/mail-batch-error.log;
    
    # 前端路由支持（Vue Router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # API 代理（如果后端在同一台服务器）
    location /api/ {
        proxy_pass http://localhost:8080;  # 后端地址
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 上传文件大小限制
    client_max_body_size 10M;
}
